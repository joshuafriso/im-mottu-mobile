name: im_mottu_mobile
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.8.0
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: 4.7.2
  objectbox: 4.2.0
  objectbox_flutter_libs: 4.2.0
  lottie: 3.3.1
  cached_network_image: 3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: 2.4.15
  flutter_launcher_icons: 0.14.3
  flutter_lints: 5.0.0
  objectbox_generator: 4.2.0
  mockito: 5.4.6

flutter_launcher_icons:
  android: "ic_launcher"
  adaptive_icon_foreground: "assets/icons/icon.png"
  adaptive_icon_background: "#e3e6f8"
  ios: true
  image_path: "assets/icons/icon.png"
  remove_alpha_ios: true
  background_color_ios: "#e3e6f8"
  min_sdk_android: 21
  adaptive_icon_foreground_inset: 22

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
